apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: heavenly
  labels: &gatewayLabels
    app: gateway
    component: edge
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels: *gatewayLabels
  template:
    metadata:
      labels: *gatewayLabels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: gateway
          image: heavenly/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - { name: NODE_ENV, valueFrom: { configMapKeyRef: { name: heavenly-config, key: NODE_ENV } } }
            - { name: PORT, valueFrom: { configMapKeyRef: { name: heavenly-config, key: GATEWAY_PORT } } }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: JWT_SECRET } } }
            - { name: REDIS_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: REDIS_URL } } }
            - { name: AUTH_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: AUTH_SERVICE_URL } } }
            - { name: LISTING_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: LISTING_SERVICE_URL } } }
            - { name: REVIEW_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: REVIEW_SERVICE_URL } } }
            - { name: BOOKING_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: BOOKING_SERVICE_URL } } }
            - { name: MEDIA_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: MEDIA_SERVICE_URL } } }
            - { name: SEARCH_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: SEARCH_SERVICE_URL } } }
            - { name: ADMIN_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: ADMIN_SERVICE_URL } } }
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 256Mi, cpu: 250m }
          livenessProbe: &httpProbe3000
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            <<: *httpProbe3000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: heavenly
spec:
  type: ClusterIP
  selector:
    app: gateway
    component: edge
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: heavenly
  labels: &bffLabels
    app: bff
    component: edge
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels: *bffLabels
  template:
    metadata:
      labels: *bffLabels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: bff
          image: heavenly/bff:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - { name: NODE_ENV, valueFrom: { configMapKeyRef: { name: heavenly-config, key: NODE_ENV } } }
            - { name: PORT, valueFrom: { configMapKeyRef: { name: heavenly-config, key: BFF_PORT } } }
            - { name: GATEWAY_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: GATEWAY_URL } } }
            - { name: SESSION_SECRET, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: SESSION_SECRET } } }
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 256Mi, cpu: 250m }
          livenessProbe: &httpProbe8080
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            <<: *httpProbe8080
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: heavenly
spec:
  type: ClusterIP
  selector:
    app: bff
    component: edge
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
