apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: heavenly
  labels: &mediaLabels
    app: media-service
    component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels: *mediaLabels
  template:
    metadata:
      labels: *mediaLabels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "3005"
    spec:
      containers:
        - name: media-service
          image: heavenly/media-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          env:
            - { name: NODE_ENV, valueFrom: { configMapKeyRef: { name: heavenly-config, key: NODE_ENV } } }
            - { name: PORT, valueFrom: { configMapKeyRef: { name: heavenly-config, key: MEDIA_PORT } } }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: JWT_SECRET } } }
            - { name: CLOUD_NAME, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: CLOUD_NAME } } }
            - { name: CLOUD_API_KEY, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: CLOUD_API_KEY } } }
            - { name: CLOUD_API_SECRET, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: CLOUD_API_SECRET } } }
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 128Mi, cpu: 150m }
          livenessProbe: &httpProbe3005
            httpGet: { path: /health, port: 3005 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            <<: *httpProbe3005
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: heavenly
spec:
  type: ClusterIP
  selector:
    app: media-service
    component: backend
  ports:
    - { name: http, port: 3005, targetPort: 3005 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: heavenly
  labels: &searchLabels
    app: search-service
    component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels: *searchLabels
  template:
    metadata:
      labels: *searchLabels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "3006"
    spec:
      containers:
        - name: search-service
          image: heavenly/search-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3006
          env:
            - { name: NODE_ENV, valueFrom: { configMapKeyRef: { name: heavenly-config, key: NODE_ENV } } }
            - { name: PORT, valueFrom: { configMapKeyRef: { name: heavenly-config, key: SEARCH_PORT } } }
            - { name: REDIS_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: REDIS_URL } } }
            - { name: LISTING_SERVICE_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: LISTING_SERVICE_URL } } }
            - { name: RABBITMQ_USER, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: RABBITMQ_USER } } }
            - { name: RABBITMQ_PASS, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: RABBITMQ_PASS } } }
            - { name: RABBITMQ_HOST, valueFrom: { configMapKeyRef: { name: heavenly-config, key: RABBITMQ_HOST } } }
            - { name: RABBITMQ_PORT, valueFrom: { configMapKeyRef: { name: heavenly-config, key: RABBITMQ_PORT } } }
            - { name: RABBITMQ_URL, value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)" }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: JWT_SECRET } } }
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 256Mi, cpu: 250m }
          livenessProbe: &httpProbe3006
            httpGet: { path: /health, port: 3006 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            <<: *httpProbe3006
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: heavenly
spec:
  type: ClusterIP
  selector:
    app: search-service
    component: backend
  ports:
    - { name: http, port: 3006, targetPort: 3006 }
---
