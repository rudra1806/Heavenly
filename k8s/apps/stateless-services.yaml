apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: heavenly
  labels: &authLabels
    app: auth-service
    component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels: *authLabels
  template:
    metadata:
      labels: *authLabels
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "3001"
    spec:
      containers:
        - name: auth-service
          image: heavenly/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - { name: NODE_ENV, valueFrom: { configMapKeyRef: { name: heavenly-config, key: NODE_ENV } } }
            - { name: PORT, valueFrom: { configMapKeyRef: { name: heavenly-config, key: AUTH_PORT } } }
            - { name: MONGO_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: MONGO_URL_AUTH } } }
            - { name: REDIS_URL, valueFrom: { configMapKeyRef: { name: heavenly-config, key: REDIS_URL } } }
            - { name: RABBITMQ_USER, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: RABBITMQ_USER } } }
            - { name: RABBITMQ_PASS, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: RABBITMQ_PASS } } }
            - { name: RABBITMQ_HOST, valueFrom: { configMapKeyRef: { name: heavenly-config, key: RABBITMQ_HOST } } }
            - { name: RABBITMQ_PORT, valueFrom: { configMapKeyRef: { name: heavenly-config, key: RABBITMQ_PORT } } }
            - { name: RABBITMQ_URL, value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)" }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: JWT_SECRET } } }
            - { name: JWT_REFRESH_SECRET, valueFrom: { secretKeyRef: { name: heavenly-secrets, key: JWT_REFRESH_SECRET } } }
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits: { memory: 256Mi, cpu: 250m }
          livenessProbe: &httpProbe3001
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            <<: *httpProbe3001
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: heavenly
spec:
  type: ClusterIP
  selector:
    app: auth-service
    component: backend
  ports:
    - { name: http, port: 3001, targetPort: 3001 }
---
